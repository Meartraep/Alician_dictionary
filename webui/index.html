<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alician Unified Workspace</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-strip">
      <div class="app-title">Alician 协作主窗口</div>
      <div id="tabBar" class="tab-bar" aria-label="主标签栏">
        <button class="tab-item active" type="button" draggable="true" data-app="dictionary">词典工具</button>
        <button class="tab-item" type="button" draggable="true" data-app="writing">写作助手</button>
        <button class="tab-item" type="button" draggable="true" data-app="dbmanager">数据库管理</button>
        <button class="tab-item" type="button" draggable="false" data-app="settings">设置</button>
      </div>
    </header>

    <main id="workspace" class="workspace">
      <div id="dockHost" class="dock-host">
        <section id="panel-dictionary" class="app-panel show" data-app-panel="dictionary">
          <div class="panel-title">词典工具</div>
          <div id="dictLayout" class="dictionary-layout">
            <div class="dictionary-left card">
              <div class="toolbar compact">
                <input id="dictQuery" type="text" placeholder="输入词语后查询" />
                <label class="check-inline">
                  <input id="dictExact" type="checkbox" />
                  精确
                </label>
                <button id="dictSearchBtn" type="button">查询</button>
                <button id="dictHistoryBtn" type="button">历史</button>
              </div>
              <div id="dictHistory" class="history-pop hidden"></div>
              <div id="dictResults" class="scroll-panel"></div>
            </div>
            <div id="dictSplit" class="splitter vertical" title="拖动调整左右占比"></div>

            <div class="dictionary-right card">
              <div class="panel-subtitle">例句与上下文</div>
              <div id="dictExamples" class="scroll-panel"></div>
            </div>
          </div>
        </section>

        <section id="panel-writing" class="app-panel" data-app-panel="writing">
          <div class="panel-title">写作助手</div>
          <div class="writing-toolbar card">
            <button id="writingImportBtn" type="button">导入TXT</button>
            <button id="writingExportBtn" type="button">导出TXT</button>
            <button id="writingSettingsBtn" type="button">设置</button>
            <input id="writingDictQuery" type="text" placeholder="在词典工具中查询词语" />
            <label class="check-inline">
              <input id="writingDictExact" type="checkbox" />
              精确
            </label>
            <button id="writingDictSearchBtn" type="button">词典查询</button>
          </div>

          <div id="writingWorkspace" class="writing-workspace">
            <div id="writingTop" class="writing-top">
              <div class="writing-main card">
                <div id="writingEditor" class="rich-editor" contenteditable="true" spellcheck="false" data-placeholder="请输入或导入文本内容..."></div>
              </div>
              <div id="writingMainSplit" class="splitter vertical" title="拖动调整编辑区与侧边栏占比"></div>
              <aside class="writing-side card">
                <div class="side-title">高亮词列表（红优先）</div>
                <div id="writingSidebar" class="scroll-panel"></div>
              </aside>
            </div>
            <div id="writingBottomSplit" class="splitter horizontal" title="拖动调整上下区域占比"></div>
            <div class="writing-bottom">
              <div id="writingExplanation" class="explanation card">
                选择右侧词条后，这里显示释义与相似词建议。
              </div>
              <div id="writingStatus" class="status-line"></div>
            </div>
          </div>

          <section id="writingSettingsPanel" class="settings-panel hidden card">
            <div class="settings-grid">
              <label class="check-inline">
                <input id="settingsStrictCase" type="checkbox" />
                严格区分大小写
              </label>
              <label>
                最大撤销步数
                <input id="settingsUndo" type="number" min="1" max="1000" value="100" />
              </label>
              <label class="check-inline">
                <input id="settingsDictionaryFormat" type="checkbox" />
                词典格式
              </label>
              <label>
                词典分隔符
                <input id="settingsDictionarySeparators" type="text" placeholder="例如 : / ： / =" />
              </label>
            </div>

            <div class="excluded-manager">
              <div class="excluded-row">
                <input id="excludedInput" type="text" placeholder="添加排除词" />
                <button id="excludedAddBtn" type="button">添加</button>
              </div>
              <div id="excludedList" class="excluded-list"></div>
            </div>

            <div class="settings-actions">
              <button id="settingsSaveBtn" type="button">保存设置</button>
              <button id="settingsCloseBtn" type="button">关闭</button>
            </div>
          </section>
        </section>

        <section id="panel-dbmanager" class="app-panel" data-app-panel="dbmanager">
          <div class="panel-title">数据库管理</div>
          <div class="dbmanager-layout">
            <div class="dbmanager-sidebar card">
              <div class="panel-subtitle">数据表</div>
              <div id="dbmTableList" class="table-list"></div>
            </div>
            <div class="dbmanager-main">
              <div class="dbmanager-toolbar card toolbar">
                <button id="dbmRefreshBtn" type="button">刷新</button>
                <input id="dbmSearchInput" type="text" placeholder="搜索当前表..." />
                <button id="dbmSearchBtn" type="button">搜索</button>
                <button id="dbmShowAllBtn" type="button">显示全部</button>
                <button id="dbmUpdateWordCountBtn" type="button">更新词频/泛度</button>
                <button id="dbmClassifyWordsBtn" type="button">更新词性统计</button>
                <button id="dbmExportCsvBtn" type="button">导出CSV</button>
                <button id="dbmExportDbBtn" type="button">导出数据库</button>
                <span style="flex:1"></span>
                <button id="dbmAddBtn" type="button">新增</button>
                <button id="dbmDeleteBtn" type="button">删除</button>
                <button id="dbmDiscardBtn" type="button" class="ghost hidden">放弃</button>
                <button id="dbmCommitBtn" type="button" class="hidden">提交</button>
              </div>
              <div class="dbmanager-data card">
                <div id="dbmDataTable" class="data-table-wrap"></div>
              </div>
              <div id="dbmStatus" class="status-line"></div>
            </div>
          </div>
          <div class="dbmanager-global card toolbar">
            <input id="dbmGlobalSearchInput" type="text" placeholder="全局跨表搜索..." />
            <button id="dbmGlobalSearchBtn" type="button">全局搜索</button>
            <button id="dbmGlobalSelectAllBtn" type="button" class="ghost">全选结果</button>
            <input id="dbmReplaceInput" type="text" placeholder="替换为..." />
            <button id="dbmReplaceBtn" type="button">批量替换</button>
            <span id="dbmGlobalStatus" style="font-size:12px;color:var(--muted);margin-left:10px"></span>
          </div>
        </section>

        <section id="panel-settings" class="app-panel" data-app-panel="settings">
          <div class="panel-title">设置</div>
          <div class="settings-page card">
            <div class="setting-row">
              <span>
                <strong>数据库更新</strong>
                <span id="updateCheckStatus" class="setting-note">就绪</span>
              </span>
              <span style="display:flex;align-items:center;gap:6px">
                <button id="checkUpdateBtn" type="button">检查更新</button>
                <button id="forceDownloadBtn" type="button" class="ghost small hidden">仍然下载</button>
              </span>
            </div>
            <label class="setting-row">
              <span>
                <strong>显示爱丽丝语原字体</strong>
                <span id="alicFontNote" class="setting-note">仅词典/写作面板中生效</span>
              </span>
              <input id="alicFontToggle" type="checkbox" role="switch" />
            </label>
            <label class="setting-row">
              <span>
                <strong>鼠标悬停切换字体</strong>
                <span id="alicHoverNote" class="setting-note">悬停时切换为另一种字体</span>
              </span>
              <input id="alicHoverToggle" type="checkbox" role="switch" />
            </label>
            <div class="setting-row">
              <span>
                <strong>悬停触发延迟</strong>
                <span id="alicHoverDelayLabel" class="setting-note">300 ms</span>
              </span>
              <input id="alicHoverDelaySlider" type="range" min="0" max="1000" step="50" value="300" />
            </div>
          </div>
        </section>
      </div>

      <div id="floatingLayer" class="floating-layer"></div>
    </main>
  </div>

  <div id="modalRoot" class="modal-root hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div id="modalTitle" class="modal-title">详情</div>
        <button id="modalCloseBtn" type="button" class="ghost">关闭</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <div id="toastRoot" class="toast-root"></div>

  <input id="fileLoader" type="file" accept=".txt,text/plain" hidden />

  <script src="./js/state.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/tabs.js"></script>
  <script src="./js/dictionary.js"></script>
  <script src="./js/writing.js"></script>
  <script src="./js/dbmanager.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
