<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>欢迎</title>
  <style>
    :root {
      --bg: #eef2f7;
      --surface: #ffffff;
      --border: #d7dde5;
      --text: #1d2a3a;
      --muted: #637083;
      --active: #409eff;
      --active-soft: #eaf4ff;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #f0f5ff 0%, #dce6f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .welcome-card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(23, 40, 65, 0.12);
      width: 520px;
      max-width: 94vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .welcome-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .welcome-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .close-btn {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .close-btn:hover {
      background: #f0f0f0;
      color: #333;
    }
    .welcome-body {
      padding: 24px 20px;
      flex: 1;
      overflow-y: auto;
    }
    .welcome-greeting {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .welcome-section {
      margin-bottom: 20px;
    }
    .welcome-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .welcome-section-body {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 10px;
    }
    .dir-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dir-row input {
      flex: 1;
      border: 1px solid #c6d0dc;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--text);
      background: #fcfdff;
    }
    .dir-row button {
      flex: 0 0 auto;
      padding: 8px 14px;
      border: 1px solid #cfd9e6;
      border-radius: 6px;
      background: #f2f6fb;
      color: #405268;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .dir-row button:hover {
      background: #e6edf5;
    }
    .dir-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    .welcome-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }
    .welcome-footer button {
      padding: 8px 24px;
      border: 0;
      border-radius: 6px;
      background: var(--active);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .welcome-footer button:hover {
      background: #3795e5;
    }
  </style>
</head>
<body>
  <div class="welcome-card">
    <div class="welcome-header">
      <h1>欢迎</h1>
      <button class="close-btn" id="closeBtn" title="关闭">&#x2715;</button>
    </div>

    <div class="welcome-body">
      <p class="welcome-greeting">欢迎使用 Meartraep 工具集！</p>

      <div class="welcome-section">
        <div class="welcome-section-title">快速开始</div>
        <div class="welcome-section-body">
          本工具集成了词典查询、写作助手等功能，帮助你更好地学习和使用爱丽丝语。
        </div>
      </div>

      <div class="welcome-section">
        <div class="welcome-section-title">数据存储位置</div>
        <div class="welcome-section-body">
          选择程序运行时数据文件（数据库、配置等）的存放目录。默认为程序所在文件夹。
        </div>
        <div class="dir-row">
          <input id="dataDirInput" type="text" placeholder="默认为程序所在目录" />
          <button id="browseBtn">浏览</button>
        </div>
        <div class="dir-hint" id="dirHint">留空则使用程序所在文件夹</div>
      </div>
    </div>

    <div class="welcome-footer">
      <button id="enterBtn">进入程序</button>
    </div>
  </div>

  <script>
    (function() {
      var closeBtn = document.getElementById("closeBtn");
      var enterBtn = document.getElementById("enterBtn");
      var browseBtn = document.getElementById("browseBtn");
      var dataDirInput = document.getElementById("dataDirInput");
      var dirHint = document.getElementById("dirHint");
      var dirSection = document.querySelector(".welcome-section:last-of-type");
      var params = new URLSearchParams((window.location.hash || "").replace(/^#/, ""));
      var allowDataDir = params.get("allowDataDir") === "1";

      if (!allowDataDir && dirSection) {
        dirSection.style.display = "none";
      }

      function closeWindow() {
        if (window.pywebview && window.pywebview.api) {
          window.pywebview.api.close();
        }
      }

      closeBtn.addEventListener("click", closeWindow);

      enterBtn.addEventListener("click", function () {
        var dir = allowDataDir ? dataDirInput.value.trim() : "";
        if (window.pywebview && window.pywebview.api) {
          window.pywebview.api.set_data_dir(dir);
          window.pywebview.api.close();
        }
      });

      browseBtn.addEventListener("click", async function () {
        if (!allowDataDir) return;
        if (!window.pywebview || !window.pywebview.api) return;
        browseBtn.disabled = true;
        try {
          var path = await window.pywebview.api.browse_data_dir();
          if (path) {
            dataDirInput.value = path;
            dirHint.textContent = "已选择：将存储到该文件夹";
          }
        } catch (e) {
          // ignore
        } finally {
          browseBtn.disabled = false;
        }
      });

      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") {
          closeWindow();
        }
      });
    })();
  </script>
</body>
</html>
